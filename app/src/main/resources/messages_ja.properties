document.guide.exceptions=想定失敗パターンと例外検証テストの観点整理に使います。
document.guide.contract=入出力・制約・依存呼び出しを仕様の最小単位として確認します。
document.guide.test_viewpoints=代表パスと品質シグナルを、正常系/異常系/境界値テストに変換します。

