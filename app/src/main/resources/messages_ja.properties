document.guide.analysis_summary=まず高複雑度・デッドコード・重複・不安定シグナルの件数を見て、優先調査箇所を決めます。
document.guide.class_overview=メソッド詳細に入る前に、パッケージ/ファイル位置とクラス特性を確認して全体像を掴みます。
