document.guide.analysis_summary=Start with high complexity, dead code, duplicate, and brittleness counts to prioritize risky areas.
document.guide.class_overview=Check package/file location and class traits first to understand context before method-level details.
document.guide.fields=Review field types and visibility to understand state ownership and dependency boundaries.
document.guide.methods=Use this table to find longer or more complex methods, then jump to the detailed sections.
document.guide.source_code=Read control flow and side effects carefully, especially input guards, external calls, and state changes.
document.guide.quality_signals=Use these signals to identify methods that should be refactored or tested more aggressively.
document.guide.branches=Focus on guard conditions and notes to identify missing edge-case tests and early-return paths.
document.guide.representative_paths=Use path type, condition, and expected result to design explicit test scenarios.
document.guide.called_methods=Check owners and signatures to understand coupling, mock targets, and integration impact.
document.guide.exceptions=Use exception lists to verify negative scenarios and expected failure behavior.
document.guide.contract=Use this contract as the specification baseline for I/O, constraints, and dependency behavior.
document.guide.test_viewpoints=Turn each path and signal into explicit test scenarios for normal, error, and boundary behavior.

